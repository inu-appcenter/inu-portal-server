name: "[Prod] CI & CD"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' ||
      (!contains(github.event.head_commit.message, '테스트코드 작성') &&
      !contains(github.event.head_commit.message, '임시 작성'))

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # Gradle 라이브러리 캐싱 추가 (빌드 시간 단축)

      - name: Create application.properties
        run: echo "${{ secrets.APPLICATION_PROPERTIES }}" > ./src/main/resources/application.properties

      - name: Create firebase_key.json
        id: create-json
        uses: jsdaniell/create-json@v1.2.3
        with:
          name: "firebase_key.json"
          json: ${{ secrets.FIREBASE_KEY }}
          dir: "src/main/resources/"

      # 아티팩트 업로드는 유지 (필요 시)
      - uses: actions/upload-artifact@v4
        with:
          name: app-configs
          path: |
            ./src/main/resources/application.properties
            ./src/main/resources/firebase_key.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test # 테스트 제외 여부는 상황에 맞게 조절

      - name: DockerHub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.TOKEN }}

      # Docker Build와 Push를 하나로 통합 + 캐시 적용
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.USERNAME }}/${{ secrets.PROJECT_NAME }}:latest
          cache-from: type=gha # GitHub 캐시 불러오기
          cache-to: type=gha,mode=max # GitHub 캐시 저장하기

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST_ADDRESS }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "compose.yaml,elastic-agent.yml"
          target: "/home/serverking/intip"

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST_ADDRESS }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /home/serverking/intip
            
            export DOCKERHUB_USERNAME=${{ secrets.USERNAME }}
            export PROJECT_NAME=${{ secrets.PROJECT_NAME }}
            export MOUNT_PATH=${{ secrets.MOUNT_PATH }}
            export KIBANA_URL=${{ secrets.KIBANA_URL }}
            
            docker login -u ${{ secrets.USERNAME }} -p ${{ secrets.TOKEN }}
            docker compose pull app
            docker compose up -d app --no-deps
