# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: "[Prod] CI & CD"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' ||
      (!contains(github.event.head_commit.message, '테스트코드 작성') &&
      !contains(github.event.head_commit.message, '임시 작성'))

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: actions/checkout@v2

    - name: Create application.properties
      run: echo "${{ secrets.APPLICATION_PROPERTIES }}" > ./src/main/resources/application.properties

    - name: Create firebase_key.json
      id: create-json
      uses: jsdaniell/create-json@v1.2.3
      with:
        name: "firebase_key.json"
        json: ${{ secrets.FIREBASE_KEY }}
        dir: 'src/main/resources/'

    - uses: actions/upload-artifact@v4
      with:
        name: app-configs
        path: |
          ./src/main/resources/application.properties
          ./src/main/resources/firebase_key.json
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew build

    - name: Detect changed files
      id: changes
      run: |
        git fetch origin main --depth=2

        if git diff --name-only HEAD^ HEAD | grep -q "^compose.yaml$"; then
          echo "compose_changed=true" >> $GITHUB_OUTPUT
        else
          echo "compose_changed=false" >> $GITHUB_OUTPUT
        fi

        if git diff --name-only HEAD^ HEAD | grep -q "^elastic-agent.yml$"; then
          echo "agent_changed=true" >> $GITHUB_OUTPUT
        else
          echo "agent_changed=false" >> $GITHUB_OUTPUT
        fi

    - name: DockerHub Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.TOKEN }}

    - name: Docker Image Build
      run: docker build --no-cache -t ${{ secrets.USERNAME }}/${{ secrets.PROJECT_NAME }} .

    - name: DockerHub Push
      run: docker push ${{ secrets.USERNAME }}/${{ secrets.PROJECT_NAME }}

    - name: Detect changed files
      id: changes
      run: |
        BEFORE="${{ github.event.before }}"
        AFTER="${{ github.sha }}"

        if git diff --name-only "$BEFORE" "$AFTER" | grep -q "^compose.yaml$"; then
          echo "compose_changed=true" >> $GITHUB_OUTPUT
        else
          echo "compose_changed=false" >> $GITHUB_OUTPUT
        fi

        if git diff --name-only "$BEFORE" "$AFTER" | grep -q "^elastic-agent.yml$"; then
          echo "agent_changed=true" >> $GITHUB_OUTPUT
        else
          echo "agent_changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Copy compose files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.HOST_ADDRESS }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "compose.yaml,elastic-agent.yml"
        target: "/home/serverking/intip"
        overwrite: true

    - name: Verify copied files
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST_ADDRESS }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          cd /home/serverking/intip
          pwd
          ls -al
          find /home/serverking/intip -maxdepth 2 -name "elastic-agent.yml" -print
          echo "===== elastic-agent.yml ====="
          cat /home/serverking/intip/elastic-agent.yml

    - name: Deploy to Server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST_ADDRESS }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_KEY }}
        port : ${{ secrets.SERVER_PORT }}
        script: |
          cd /home/serverking/intip
          
          export DOCKERHUB_USERNAME=${{ secrets.USERNAME }}
          export PROJECT_NAME=${{ secrets.PROJECT_NAME }}
          export MOUNT_PATH=${{ secrets.MOUNT_PATH }}
          export KIBANA_URL=${{ secrets.KIBANA_URL }}
          
          docker login -u ${{ secrets.USERNAME }} -p ${{ secrets.TOKEN }}
          
          if [ "${{ steps.changes.outputs.compose_changed }}" = "true" ]; then
            docker compose pull
            docker compose up -d
          elif [ "${{ steps.changes.outputs.agent_changed }}" = "true" ]; then
            docker compose pull app
            docker compose up -d app --no-deps
            docker compose up -d --force-recreate elastic-agent
          else
            docker compose pull app
            docker compose up -d app --no-deps
          fi