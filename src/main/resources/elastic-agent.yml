outputs:
  default:
    type: elasticsearch
    hosts: ["http://elasticsearch:9200"]

inputs:
  - id: intip-app-logs
    type: filestream
    use_output: default
    streams:
      - id: intip-app-logs-stream
        data_stream:
          dataset: intip.application
          namespace: prod
          type: logs
        paths:
          - /intip/logs/intip.log
          - /intip/logs/intip.*.log
        parsers:
          - ndjson:
              target: ""
              overwrite_keys: true
              add_error_key: true

agent:
  monitoring:
    enabled: true
    use_output: default
    logs: true
    metrics: true
